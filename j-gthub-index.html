<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画像収束 実験ページ</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;
  background:#f4f6fb;
  text-align:center;
}

.container{
  max-width:640px;
  margin:auto;
  background:#ffffff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

h2{
  font-size:18px;
  margin-bottom:15px;
  color:#2c3e50;
}

.description{
  font-size:13px;
  color:#666;
  line-height:1.6;
  margin-bottom:20px;
}

#stage{
  width:320px;
  height:320px;
  margin:20px auto;
  background:#000;
  position:relative;
  overflow:hidden;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.piece{
  position:absolute;
  background-size:320px 320px;
  pointer-events:none;
}

textarea{
  width:100%;
  height:80px;
  border-radius:10px;
  border:2px dashed #ccd6e0;
  padding:12px;
  font-family:monospace;
  font-size:11px;
  background:#f9fbff;
  box-sizing:border-box;
  resize:none;
}

textarea:focus{
  border-color:#4a90e2;
  outline:none;
  background:#ffffff;
}

select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

.button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.setup-btn{
  background:#4a90e2;
  color:white;
}

.setup-btn:hover{
  background:#357abd;
}

.play-btn{
  background:#27ae60;
  color:white;
}

.play-btn:hover{
  background:#1e8c4a;
}

.notice{
  font-size:12px;
  color:#888;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>画像収束 実験ページ</h2>

<div class="description">
① 分散データを貼り付けます。<br>
② 「準備する」を押します。<br>
③ 「収束開始」で画像が元に戻ります。
</div>

<textarea id="dispersion-area" placeholder="ここに分散JSONデータを貼り付けてください"></textarea>

<select id="imgSelect">
  <option value="A01.jpg">画像 A01</option>
  <option value="A02.jpg">画像 A02</option>
  <option value="A03.jpg">画像 A03</option>
  <option value="A04.jpg">画像 A04</option>
  <option value="A05.jpg">画像 A05</option>
  <option value="A06.jpg">画像 A06</option>
  <option value="A07.jpg">画像 A07</option>
  <option value="A08.jpg">画像 A08</option>
</select>

<button class="button setup-btn" onclick="init()">準備する</button>

<div id="stage"></div>

<button class="button play-btn" onclick="playReverse()">収束開始</button>

<div class="notice">
※ 正しいJSON形式のデータを使用してください
</div>

</div>

<script>
let pieces = [];

function init(){
  const area = document.getElementById("dispersion-area");
  const stage = document.getElementById("stage");
  const imgUrl = document.getElementById("imgSelect").value;

  if(!area.value){
    alert("分散データを入力してください。");
    return;
  }

  try{
    const data = JSON.parse(area.value);

    if(data.length !== 16){
      alert("データ数が16個ではありません。");
      return;
    }

    stage.innerHTML = "";
    pieces = [];

    for(let i=0;i<16;i++){
      const x = (i % 4) * 80;
      const y = Math.floor(i / 4) * 80;

      const p = document.createElement("div");
      p.className="piece";
      p.style.cssText=
        `width:80px;height:80px;left:${x}px;top:${y}px;
         background-image:url(${imgUrl});
         background-position:-${x}px -${y}px;
         transition:none;`;

      p.style.transform = data[i].transform;
      p.style.opacity = data[i].opacity;

      stage.appendChild(p);
      pieces.push(p);
    }

  }catch(e){
    alert("JSON形式が正しくありません。");
  }
}

function playReverse(){
  if(pieces.length===0) return;

  pieces.forEach((p,i)=>{
    p.style.transition=`all 2s cubic-bezier(0.1,0.8,0.2,1) ${i*0.04}s`;
    p.style.transform="translate(0,0) rotate(0) scale(1)";
    p.style.opacity="1";
  });
}
</script>

</body>
</html>
